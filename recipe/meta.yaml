{% set name = "typed-argument-parser" %}
{% set version = "1.11.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 71a4f7661d1c072101bad014f26cbc2c7cf0e626c51fc7681c66975cc1ecc723

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - packaging
    - python >={{ python_min }}
    - typing_inspect >=0.7.1
    - docstring_parser >=0.15

test:
  imports:
    - tap
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/swansonk14/typed-argument-parser
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Typed argument parser for Python
  description: |
    Tap is a typed modernization of Python's argparse library.
  doc_url: https://github.com/swansonk14/typed-argument-parser
  dev_url: https://github.com/swansonk14/typed-argument-parser

extra:
  recipe-maintainers:
    - jan-janssen
