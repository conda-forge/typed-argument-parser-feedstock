{% set name = "typed-argument-parser" %}
{% set version = "1.12.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: cf5f7cafac869fb9627c4c90394e321c895d58872d865ad2c62e65668d259fa0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - packaging
    - python >={{ python_min }}
    - typing_inspect >=0.7.1
    - docstring_parser >=0.15

test:
  imports:
    - tap
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/swansonk14/typed-argument-parser
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Typed argument parser for Python
  description: |
    Tap is a typed modernization of Python's argparse library.
  doc_url: https://github.com/swansonk14/typed-argument-parser
  dev_url: https://github.com/swansonk14/typed-argument-parser

extra:
  recipe-maintainers:
    - jan-janssen
